  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --white: #ffffff;
      --black: #111110;
      --gray: #888884;
      --light: #f5f4f0;
      --tooltip-bg: #111110;
      --tooltip-text: #ffffff;
      --tooltip-sub: #888884;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--white);
      color: var(--black);
      font-family: 'DM Mono', monospace;
      overflow: hidden;
    }

    /* ── layout ── */
    .page {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* ── name / header ── */
    .name {
      position: absolute;
      top: 48px;
      left: 56px;
      font-family: 'DM Serif Display', serif;
      font-size: clamp(28px, 4vw, 48px);
      letter-spacing: -0.02em;
      line-height: 1;
      color: var(--black);
      pointer-events: none;
      user-select: none;
    }

    .name em {
      font-style: italic;
      color: var(--gray);
    }

    /* ── hint text ── */
    .hint {
      position: absolute;
      bottom: 48px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gray);
      opacity: 0;
      animation: fadeIn 0.6s ease 1.2s forwards;
      white-space: nowrap;
    }

    /* ── SVG wrapper ── */
    .scene {
      width: min(680px, 90vw);
      position: relative;
      opacity: 0;
      transform: translateY(16px);
      animation: riseIn 0.7s cubic-bezier(0.22, 1, 0.36, 1) 0.3s forwards;
    }

    .scene svg {
      width: 100%;
      height: auto;
      display: block;
    }

    /* ── tooltip ── */
    .tooltip {
      position: absolute;
      background: var(--tooltip-bg);
      color: var(--tooltip-text);
      padding: 10px 14px;
      border-radius: 6px;
      pointer-events: none;
      opacity: 0;
      transform: translateY(4px);
      transition: opacity 0.18s ease, transform 0.18s ease;
      white-space: nowrap;
      z-index: 10;
    }

    .tooltip.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .tooltip .label {
      font-size: 12px;
      font-weight: 400;
      letter-spacing: 0.04em;
    }

    .tooltip .sublabel {
      font-size: 11px;
      color: var(--tooltip-sub);
      margin-top: 2px;
      letter-spacing: 0.02em;
    }

    /* ── clickable SVG items ── */
    .scene svg .item {
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .scene svg .item:hover {
      opacity: 0.7;
    }

    /* ── person special ── */
    .scene svg #person-group {
      cursor: pointer;
    }
    .scene svg #person-group:hover .person-body {
      opacity: 0.8;
    }

    /* ── cv link ── */
    .cv-link {
      display: none;
    }

    /* ── animations ── */
    @keyframes riseIn {
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeIn {
      to { opacity: 1; }
    }

    /* ── subtle line top ── */
    .topline {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: var(--black);
    }
  </style>
</head>

<script>
  const tooltip  = document.getElementById('tooltip');
  const ttLabel  = document.getElementById('tt-label');
  const ttSub    = document.getElementById('tt-sub');
  const scene    = document.getElementById('scene');

  let activeItem = null;

  // Position tooltip near cursor, keeping it on screen
  function positionTooltip(e) {
    const sceneRect = scene.getBoundingClientRect();
    const tw = tooltip.offsetWidth;
    const th = tooltip.offsetHeight;

    // Use pageX/Y relative to the scene div
    let x = e.clientX - sceneRect.left + 14;
    let y = e.clientY - sceneRect.top  - th - 10;

    // Keep within scene bounds
    if (x + tw > sceneRect.width)  x = e.clientX - sceneRect.left - tw - 14;
    if (y < 0)                      y = e.clientY - sceneRect.top  + 18;

    tooltip.style.left = x + 'px';
    tooltip.style.top  = y + 'px';
  }

  scene.addEventListener('mousemove', e => {
    const item = e.target.closest('.item');
    if (item && activeItem === item) {
      positionTooltip(e);
    }
  });

  scene.addEventListener('mouseover', e => {
    const item = e.target.closest('.item');
    if (!item) return;
    activeItem = item;
    ttLabel.textContent = item.dataset.label || '';
    ttSub.textContent   = item.dataset.sub   || '';
    tooltip.classList.add('visible');
  });

  scene.addEventListener('mouseout', e => {
    const item = e.target.closest('.item');
    if (!item) return;
    const related = e.relatedTarget;
    if (related && related.closest('.item') === item) return;
    activeItem = null;
    tooltip.classList.remove('visible');
  });

  scene.addEventListener('click', e => {
    const item = e.target.closest('.item');
    if (!item) return;
    const href = item.dataset.href;
    if (href) window.location.href = href;
  });
</script>
