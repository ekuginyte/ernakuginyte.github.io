<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #e8e4dc;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Inter', sans-serif;
  }
  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.25rem;
    padding: 2rem;
  }
  .title {
    font-size: 0.65rem;
    font-weight: 300;
    color: #aaa;
    letter-spacing: 0.25em;
    text-transform: uppercase;
  }
  .hint {
    font-size: 0.6rem;
    font-weight: 300;
    color: #bbb;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    transition: opacity 0.6s;
  }
  .svg-wrapper:hover ~ .hint { opacity: 0; }
  .svg-wrapper {
    position: relative;
    width: min(90vw, 680px);
    height: min(90vw, 680px);
    cursor: crosshair;
  }
  .svg-wrapper svg {
    width: 100%;
    height: 100%;
    overflow: visible;
  }
  .layer-group {
    transition: transform 0.7s cubic-bezier(0.34, 1.4, 0.64, 1);
  }
  .svg-wrapper:hover .layer-desk { transform: translate(0px, 0px); }
  .svg-wrapper:hover .layer-screen { transform: translate(53.67px, -26.83px); }
  .svg-wrapper:hover .layer-mat { transform: translate(-49.19px, -24.6px); }
  .svg-wrapper:hover .layer-laptop { transform: translate(84.97px, 42.49px); }
  .svg-wrapper:hover .layer-keyboard { transform: translate(-49.19px, -24.6px); }
  .svg-wrapper:hover .layer-mouse { transform: translate(49.19px, 24.6px); }
  .svg-wrapper:hover .layer-mug { transform: translate(-80.5px, -40.25px); }
  .svg-wrapper:hover .layer-chair { transform: translate(-35.78px, 17.89px); }
  .svg-wrapper:hover .layer-me { transform: translate(-35.78px, 17.89px); }
  .svg-wrapper:hover .layer-chair2 { transform: translate(-35.78px, 17.89px); }
  .hit-area { fill: transparent; stroke: none; cursor: pointer; }
  .label-group {
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.25s ease;
  }
  .label-group.visible { opacity: 1; }
  .label-line {
    stroke: #c47a3a;
    stroke-width: 0.8;
    fill: none;
    stroke-dasharray: 300;
    stroke-dashoffset: 300;
    transition: stroke-dashoffset 0.4s ease 0.05s;
    marker-end: url(#arrowhead);
  }
  .label-group.visible .label-line { stroke-dashoffset: 0; }
  .label-dot { fill: #c47a3a; }
  .label-name {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 400;
    fill: #2d2620;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .label-sub {
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 300;
    fill: #a08060;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .label-name.is-about {
    font-size: 13px;
    font-weight: 600;
    fill: #c47a3a;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
  }
  .copied-text {
    font-family: 'Inter', sans-serif;
    font-size: 9px;
    font-weight: 300;
    fill: #c47a3a;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0;
    transition: opacity 0.2s;
  }
  .copied-text.show { opacity: 1; }
</style>

<script>
const wrapper = document.getElementById('wrapper');
let wrapperHovered = false;
let activeLayer = null;
const layerTransforms = {
  screen: [53.67, -26.83],
  laptop: [84.97, 42.49],
  keyboard: [-49.19, -24.6],
  mouse: [49.19, 24.6],
  mug: [-80.5, -40.25],
  chair: [-35.78, 17.89],
  me: [-35.78, 17.89],
};
function positionLabels(hovered) {
  document.querySelectorAll('.label-group').forEach(el => {
    const t = layerTransforms[el.dataset.layer] || [0, 0];
    el.style.transform = hovered ? `translate(${t[0]}px, ${t[1]}px)` : 'translate(0,0)';
    el.style.transition = 'transform 0.7s cubic-bezier(0.34, 1.4, 0.64, 1)';
  });
}
function showLabel(id) {
  if (activeLayer === id) return;
  hideAllLabels();
  activeLayer = id;
  const el = document.getElementById('label-' + id);
  if (el) el.classList.add('visible');
}
function hideAllLabels() {
  document.querySelectorAll('.label-group').forEach(el => el.classList.remove('visible'));
  activeLayer = null;
}
wrapper.addEventListener('mouseenter', () => { wrapperHovered = true;  positionLabels(true);  });
wrapper.addEventListener('mouseleave', () => { wrapperHovered = false; positionLabels(false); hideAllLabels(); });
document.querySelectorAll('.hit-area').forEach(el => {
  el.addEventListener('mouseenter', () => { if (wrapperHovered) showLabel(el.dataset.layer); });
  el.addEventListener('mouseleave', () => hideAllLabels());
});
document.querySelectorAll('.label-group').forEach(label => {
  const { kind, name, layer: layerId } = label.dataset;
  if (kind === 'product') {
    label.style.cursor = 'pointer';
    label.addEventListener('click', () => {
      navigator.clipboard.writeText(name).then(() => {
        const flash = document.getElementById('copied-' + layerId);
        if (flash) { flash.classList.add('show'); setTimeout(() => flash.classList.remove('show'), 1400); }
      });
    });
  } else if (kind === 'about') {
    label.style.cursor = 'pointer';
    label.addEventListener('click', () => { window.location.href = 'about.html'; });
  }
});
</script>
